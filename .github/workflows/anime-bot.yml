name: تشغيل بوت الأنمي والواتساب
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run-anime-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: استيراد الكود
      uses: actions/checkout@v4

    - name: إعداد بايثون
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: تثبيت الحزم النظامية
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          chromium-browser \
          chromium-chromedriver \
          ffmpeg \
          xvfb \
          nodejs \
          npm

    - name: إعداد ChromeDriver
      run: |
        sudo ln -sf /usr/lib/chromium-browser/chromedriver /usr/local/bin/chromedriver
        chromedriver --version

    - name: إعداد Puppeteer
      run: |
        echo '{"name":"bot","version":"1.0.0"}' > package.json
        npm install puppeteer --no-package-lock
        echo "PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser" >> $GITHUB_ENV

    - name: ترقية pip
      run: python -m pip install --upgrade pip

    - name: تثبيت مكتبات بايثون
      run: |
        pip install selenium==4.15.2
        pip install webdriver-manager==4.0.2
        pip install requests==2.31.0
        pip install beautifulsoup4==4.12.2
        pip install lxml==4.9.3
        pip install ffmpeg-python==0.2.0
        pip install Pillow==10.1.0
        pip install python-dotenv==1.0.0
        pip install cloudscraper==1.2.71
        pip install tqdm==4.66.1
        pip install pyppeteer==1.0.2
        pip install aiohttp==3.9.1
        pip install fake-useragent==1.4.0
        pip install urllib3==2.1.0

    - name: إعداد المجلدات
      run: |
        mkdir -p downloads compressed logs database session temp
        if [ -f start.sh ]; then
          chmod +x start.sh
        fi

    - name: تشغيل البوت
      run: xvfb-run -a python run.py
      env:
        PYTHONUNBUFFERED: 1
        DISPLAY: :99

    - name: حفظ الجلسة
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: جلسة-الواتساب-${{ github.run_id }}
        path: session/
        retention-days: 7
        if-no-files-found: ignore

    - name: حفظ التحميلات
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: تحميلات-الأنمي-${{ github.run_id }}
        path: |
          downloads/
          compressed/
        retention-days: 7
        if-no-files-found: ignore

    - name: حفظ السجلات
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: سجلات-التشغيل-${{ github.run_id }}
        path: logs/
        retention-days: 7
        if-no-files-found: ignore

    - name: تلخيص التشغيل
      if: always()
      run: |
        echo "===================================="
        echo "📊 ملخص التشغيل"
        echo "===================================="
        echo "✅ الحالة: ${{ job.status }}"
        echo "🕒 وقت التشغيل: $(date)"
        echo "📁 الملفات في downloads:"
        ls -lh downloads/ 2>/dev/null | head -10 || echo "لا توجد ملفات"
        echo "===================================="

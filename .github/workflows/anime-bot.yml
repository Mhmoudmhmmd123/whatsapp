name: تشغيل بوت الأنمي والواتساب
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # تشغيل يدوي
  schedule:
    - cron: '0 */6 * * *'  # كل 6 ساعات

jobs:
  run-anime-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 ساعات كاملة

    steps:
    - name: استيراد الكود من المستودع
      uses: actions/checkout@v4

    - name: إعداد بايثون
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: تثبيت الحزم النظامية المطلوبة
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          chromium-browser \
          ffmpeg \
          wget \
          unzip \
          xvfb \
          nodejs \
          npm

    - name: تثبيت ChromeDriver
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser chromium-chromedriver
        sudo ln -sf /usr/lib/chromium-browser/chromedriver /usr/local/bin/chromedriver
        chromedriver --version

    - name: إعداد Puppeteer
      run: |
        echo "📦 استخدام package.json الموجود"
        if [ -f package.json ]; then
          echo "✅ ملف package.json موجود"
          cat package.json | head -10
        else
          echo "❌ ملف package.json غير موجود، سيتم إنشاؤه"
          npm init -y
        fi
        
        # تثبيت Puppeteer
        echo "جاري تثبيت Puppeteer..."
        npm install puppeteer --no-package-lock
        
        # تحديد مسار Chrome
        CHROME_PATH=$(which chromium-browser)
        export PUPPETEER_EXECUTABLE_PATH=$CHROME_PATH
        echo "✅ Puppeteer مثبت، مسار Chrome: $CHROME_PATH"

    - name: ترقية pip
      run: python -m pip install --upgrade pip

    - name: تثبيت مكتبات بايثون من requirements.txt
      run: |
        pip install -r requirements.txt

    - name: تأكيد التثبيت
      run: |
        echo "✅ المكتبات المثبتة:"
        pip list | grep -E "selenium|requests|beautifulsoup|ffmpeg|Pillow|cloudscraper|pyppeteer|aiohttp" || echo "بعض المكتبات لم تظهر"

    - name: إعداد هيكل المجلدات
      run: |
        if [ -f start.sh ]; then
          chmod +x start.sh
        fi
        mkdir -p downloads
        mkdir -p logs
        mkdir -p database
        mkdir -p compressed
        mkdir -p temp
        mkdir -p session
        echo "📁 المجلدات التي تم إنشاؤها:"
        ls -la

    - name: إعداد متغيرات البيئة
      run: |
        if [ -f .env ]; then
          echo "✅ ملف .env موجود"
          echo "محتويات .env (بدون أسرار):"
          grep -v "=" .env | cat || echo "لا توجد متغيرات"
        else
          echo "⚠️ لا يوجد ملف .env، سيتم إنشاء ملف افتراضي"
          echo "# ملف البيئة الافتراضي" > .env
          echo "DEBUG=true" >> .env
        fi

    - name: اختبار التثبيت
      run: |
        echo "🧪 اختبار التثبيت..."
        if [ -f test_installation.py ]; then
          python test_installation.py || echo "⚠️ اختبار التثبيت يحتاج تعديل"
        else
          echo "⚠️ لا يوجد ملف test_installation.py"
        fi

    - name: عرض معلومات المشروع
      run: |
        echo "===================================="
        echo "📋 معلومات المشروع:"
        echo "===================================="
        echo "📁 الملفات الرئيسية:"
        ls -la *.py 2>/dev/null || echo "لا توجد ملفات بايثون"
        echo ""
        echo "📚 ملفات التوثيق:"
        ls -la *.md *.txt 2>/dev/null || echo "لا توجد ملفات توثيق"
        echo ""
        echo "📦 محتويات requirements.txt:"
        cat requirements.txt 2>/dev/null || echo "لا يوجد requirements.txt"
        echo "===================================="

    - name: تشغيل البوت الرئيسي
      run: |
        echo "===================================="
        echo "🚀 بدء تشغيل بوت الأنمي والواتساب"
        echo "===================================="
        echo "📱 انتظر ظهور QR code للمسح"
        echo "💡 أرسل /start في واتساب بعد المسح"
        echo "===================================="
        
        # استخدام xvfb للتشغيل بدون واجهة رسومية
        xvfb-run -a python run.py
      env:
        PYTHONUNBUFFERED: 1
        DISPLAY: :99
        CHROME_BIN: /usr/bin/chromium-browser
        PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser

    - name: حفظ جلسة الواتساب (للجلسات المستقبلية)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: واتساب-جلسة-${{ github.run_id }}
        path: |
          session/
          *.session
          *.data
        retention-days: 7
        if-no-files-found: ignore

    - name: رفع الملفات التي تم تحميلها
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: تحميلات-الأنمي-${{ github.run_id }}
        path: |
          downloads/
          compressed/
          *.mp4
          *.mkv
          *.avi
          *.srt
          *.zip
          *.rar
        retention-days: 7
        if-no-files-found: ignore

    - name: حفظ سجلات التشغيل
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: سجلات-التشغيل-${{ github.run_id }}
        path: |
          logs/
          *.log
          *.txt
        retention-days: 7
        if-no-files-found: ignore

    - name: تلخيص التشغيل
      if: always()
      run: |
        echo "===================================="
        echo "📊 ملخص التشغيل"
        echo "===================================="
        echo "✅ الحالة: ${{ job.status }}"
        echo "🕒 وقت التشغيل: $(date)"
        echo "🔢 رقم التشغيل: ${{ github.run_id }}"
        echo ""
        echo "📁 محتويات مجلد التحميلات:"
        if [ -d downloads ]; then
          ls -lh downloads/ | head -20 || echo "المجلد فارغ"
          echo "عدد الملفات: $(ls -1 downloads/ 2>/dev/null | wc -l)"
        else
          echo "لا توجد تحميلات"
        fi
        echo ""
        echo "📁 محتويات مجلد المضغوط:"
        if [ -d compressed ]; then
          ls -lh compressed/ | head -10 || echo "المجلد فارغ"
        else
          echo "لا توجد ملفات مضغوطة"
        fi
        echo ""
        echo "📄 آخر 20 سطر من السجلات:"
        if [ -f logs/bot.log ]; then
          tail -n 20 logs/bot.log
        else
          echo "لا توجد سجلات"
        fi
        echo "===================================="
